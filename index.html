<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-Style Media Hub</title>
    <style>
        /* 1. THE LOOK: Dark mode & Cinema styling */
        body { background-color: #141414; color: white; font-family: 'Helvetica', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        .player-container { max-width: 850px; margin: auto; background: #000; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        #video-title { font-size: 1.6rem; margin-bottom: 15px; color: #e50914; min-height: 1.6em; }

        /* 2. THE MENU: Side-scrolling for 20+ files */
        .playlist { 
            display: flex; gap: 12px; margin-top: 20px; overflow-x: auto; padding: 20px 10px;
            scrollbar-width: thin; scrollbar-color: #e50914 #333;
        }
        
        /* 3. BUTTONS: Netflix red hover effect */
        .media-btn {
            background: #333; color: white; border: none; padding: 12px 24px; border-radius: 6px;
            cursor: pointer; transition: 0.3s; font-weight: bold; flex-shrink: 0;
        }
        .media-btn:hover { background: #e50914; transform: translateY(-3px); }
        
        .controls-row { margin-top: 25px; }
        .next-btn { background: white; color: black; border: none; padding: 14px 40px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .next-btn:hover { background: #ccc; }
    </style>
</head>
<body>

<div class="player-container">
    <h3 id="video-title">Press Play to Start</h3>
    
    <!-- MAIN SCREEN: 'poster.jpg' is the default logo shown at start -->
    <video id="mainPlayer" width="100%" controls poster="poster.jpg" style="max-height: 450px; border-radius: 4px; background: #111;">
        <source id="mediaSource" src="" type="video/mp4">
        Your browser does not support the media player.
    </video>

    <!-- AUTO-MENU -->
    <div class="playlist" id="button-hub"></div>

    <div class="controls-row">
        <button class="next-btn" onclick="nextTrack()">NEXT EPISODE ⏭️</button>
    </div>
</div>

<script>
    // 1. THE MASTER LIST: Note the COMMAS at the end of each line!
    const playlist = [
        { src: 'VideoCompress_The Capstone PRD_ Building MediLink Global (Heart, Soul, Limbs, & Armor).mp4', title: 'Intro Video', poster: 'thumbnail.jpg' },
        { src: 'Turning_user_fear_into_buildable_code (1).m4a', title: 'Chapter 1 (Audio)', poster: 'cover.jpg' },
        { src: 'lesson.mp3', title: 'Lesson 2 (Audio)', poster: 'cover.jpg' },
        { src: 'video2.mp4', title: 'Final Project Demo', poster: 'thumbnail.jpg' }, // Added comma
        { src: 'video1.mp4', title: 'Intro Video v2', poster: 'thumbnail.jpg' }, // Added comma
        { src: 'Turning_user_fear_into_buildable_code.m4a', title: 'Chapter 1 (Audio) v2', poster: 'cover.jpg' }, // Added comma
        { src: 'lesson.mp3', title: 'Lesson 2 (Audio) v2', poster: 'cover.jpg' }, // Added comma
        { src: 'video2.mp4', title: 'Final Project Demo v2', poster: 'thumbnail.jpg' }, // Added comma
        { src: 'video1.mp4', title: 'Intro Video v3', poster: 'thumbnail.jpg' }, // Added comma
        { src: 'narration.m4a', title: 'Chapter 1 (Audio) v3', poster: 'cover.jpg' }, // Added comma
        { src: 'lesson.mp3', title: 'Lesson 2 (Audio) v3', poster: 'cover.jpg' }, // Added comma
        { src: 'video2.mp4', title: 'Final Project Demo v3', poster: 'thumbnail.jpg' } // Last item: No comma needed
    ];

    let currentIndex = 0;
    const player = document.getElementById('mainPlayer');
    const source = document.getElementById('mediaSource');
    const titleDisplay = document.getElementById('video-title');
    const buttonContainer = document.getElementById('button-hub');

    // 2. AUTOMATIC MENU BUILDER
    playlist.forEach((item, index) => {
        const btn = document.createElement('button');
        btn.className = 'media-btn';
        btn.innerText = `EP ${index + 1}: ${item.title}`;
        
        btn.onclick = () => {
            currentIndex = index;
            changeMedia(item);
        };
        
        buttonContainer.appendChild(btn);
    });

    // 3. THE LOGIC
    function changeMedia(track) {
        if (track.src.endsWith('.mp3')) {
            source.type = "audio/mpeg";
        } else if (track.src.endsWith('.m4a')) {
            source.type = "audio/mp4";
        } else {
            source.type = "video/mp4";
        }

        source.src = track.src;
        player.poster = track.poster;
        titleDisplay.innerText = "Now Playing: " + track.title;
        
        player.load(); 
        player.play(); 
    }

    // 4. NEXT BUTTON LOGIC
    function nextTrack() {
        currentIndex = (currentIndex + 1) % playlist.length;
        changeMedia(playlist[currentIndex]);
    }
</script>

</body>
</html>
